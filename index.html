<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konverter Log Transaksi Gethub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f4f6f9;
            color: #333;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: monospace;
            margin-bottom: 15px;
        }
        .btn-group {
            margin-bottom: 20px;
        }
        button {
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
            margin-right: 5px;
            font-weight: bold;
        }
        .btn-submit { background-color: #3498db; color: white; }
        .btn-submit:hover { background-color: #2980b9; }
        
        .btn-copy-1 { background-color: #2ecc71; color: white; }
        .btn-copy-1:hover { background-color: #27ae60; }

        .btn-copy-2 { background-color: #27ae60; color: white; }
        .btn-copy-2:hover { background-color: #1e7e34; }
        
        .btn-reset { background-color: #e74c3c; color: white; }
        .btn-reset:hover { background-color: #c0392b; }
        
        .table-container {
            margin-top: 25px;
            overflow-x: auto;
        }
        .tables-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            font-size: 14px;
        }
        th {
            background-color: #2c3e50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .table-title {
            font-weight: bold;
            color: #2c3e50;
            margin-top: 10px;
            border-left: 4px solid #3498db;
            padding-left: 8px;
        }
        @media (max-width: 768px) {
            .tables-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Konverter Log Transaksi</h2>
    <p>Tempelkan log transaksi mentah di bawah ini:</p>
    <textarea id="rawLog" placeholder="Tempel log mentah di sini... (Salin langsung dari spreadsheet)"></textarea>
    
    <div class="btn-group">
        <button class="btn-submit" onclick="processData()">Submit Data</button>
        <button class="btn-copy-1" onclick="copyTable1()">Salin Tabel 1</button>
        <button class="btn-copy-2" onclick="copyTable2()">Salin Tabel 2</button>
        <button class="btn-reset" onclick="resetAll()">Reset All</button>
    </div>

    <h3>Hasil Submit</h3>
    
    <div class="tables-grid">
        <!-- TABEL 1 -->
        <div class="table-container">
            <div class="table-title">Tabel 1 (Format Awal)</div>
            <table id="table1">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Tanggal Terima</th>
                        <th>User</th>
                        <th>Jumlah</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="4" style="text-align: center; color: #888;">Belum ada data.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- TABEL 2 -->
        <div class="table-container">
            <div class="table-title">Tabel 2 (Format Baru)</div>
            <table id="table2">
                <thead>
                    <tr>
                        <th>WAKTU</th>
                        <th>Used ID</th>
                        <th>Tujuan Bank</th>
                        <th>kredit</th>
                        <th>Jumlah</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" style="text-align: center; color: #888;">Belum ada data.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
let dataTabel1 = [];
let dataTabel2 = [];

function processData() {
    const rawText = document.getElementById('rawLog').value.trim();
    if (!rawText) {
        alert('Silakan tempelkan log transaksi terlebih dahulu!');
        return;
    }

    const lines = rawText.split('\n');
    let parsedRows = [];

    lines.forEach(line => {
        const trimmedLine = line.trim();
        if (trimmedLine === "") return;

        const columns = trimmedLine.split('\t');

        if (columns.length >= 6) {
            // Mengambil jam saja dari kolom B (Waktu)
            const jamSaja = columns[1] ? columns[1].trim() : "";
            const userText = columns[2] ? columns[2].trim() : ""; 
            const bankText = columns[3] ? columns[3].trim() : "";
            
            // Menghapus tanda minus (-) pada kolom kredit (Kolom E / indeks 4)
            let kreditText = columns[4] ? columns[4].trim() : "";
            if (kreditText === "-") {
                kreditText = "";
            }

            const jumlahText = columns[5] ? columns[5].trim() : "";

            parsedRows.push({
                jam: jamSaja,
                user: userText,
                bank: bankText,
                kredit: kreditText,
                jumlah: jumlahText
            });
        }
    });

    if (parsedRows.length === 0) {
        alert('Format log tidak dikenali. Pastikan Anda menyalin data langsung dari tabel spreadsheet minimal kolom A sampai F.');
        return;
    }

    // Balik urutan data (Bawah ke Atas)
    parsedRows.reverse();

    // Simpan ke data global untuk fitur salin
    dataTabel1 = parsedRows;
    dataTabel2 = parsedRows;

    // Render TABEL 1
    const tbody1 = document.querySelector('#table1 tbody');
    tbody1.innerHTML = "";
    dataTabel1.forEach((row, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${index + 1}</td>
            <td>${row.jam}</td>
            <td>${row.user}</td>
            <td>${row.jumlah}</td>
        `;
        tbody1.appendChild(tr);
    });

    // Render TABEL 2
    const tbody2 = document.querySelector('#table2 tbody');
    tbody2.innerHTML = "";
    dataTabel2.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${row.jam}</td>
            <td>${row.user}</td>
            <td>${row.bank}</td>
            <td>${row.kredit}</td>
            <td>${row.jumlah}</td>
        `;
        tbody2.appendChild(tr);
    });
}

// Fungsi Salin Tabel 1
function copyTable1() {
    if (dataTabel1.length === 0) { alert('Tidak ada data di Tabel 1!'); return; }
    let text = "No\tTanggal Terima\tUser\tJumlah\n";
    dataTabel1.forEach((row, index) => {
        text += `${index + 1}\t${row.jam}\t${row.user}\t${row.jumlah}\n`;
    });
    navigator.clipboard.writeText(text.trim()).then(() => alert('Tabel 1 berhasil disalin!'));
}

// Fungsi Salin Tabel 2
function copyTable2() {
    if (dataTabel2.length === 0) { alert('Tidak ada data di Tabel 2!'); return; }
    let text = "WAKTU\tUsed ID\tTujuan Bank\tkredit\tJumlah\n";
    dataTabel2.forEach(row => {
        text += `${row.jam}\t${row.user}\t${row.bank}\t${row.kredit}\t${row.jumlah}\n`;
    });
    navigator.clipboard.writeText(text.trim()).then(() => alert('Tabel 2 berhasil disalin!'));
}

// Fungsi Reset Semua
function resetAll() {
    document.getElementById('rawLog').value = "";
    dataTabel1 = [];
    dataTabel2 = [];
    document.querySelector('#table1 tbody').innerHTML = `<tr><td colspan="4" style="text-align: center; color: #888;">Belum ada data.</td></tr>`;
    document.querySelector('#table2 tbody').innerHTML = `<tr><td colspan="5" style="text-align: center; color: #888;">Belum ada data.</td></tr>`;
}
</script>

</body>
</html>
