<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konverter Log Transaksi Gethub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f4f6f9;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: monospace;
            margin-bottom: 15px;
        }
        .btn-group {
            margin-bottom: 15px;
        }
        button {
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
            margin-right: 5px;
        }
        .btn-submit {
            background-color: #3498db;
            color: white;
        }
        .btn-submit:hover {
            background-color: #2980b9;
        }
        .btn-copy {
            background-color: #2ecc71;
            color: white;
        }
        .btn-copy:hover {
            background-color: #27ae60;
        }
        .btn-reset {
            background-color: #e74c3c;
            color: white;
        }
        .btn-reset:hover {
            background-color: #c0392b;
        }
        .table-container {
            margin-top: 25px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #2c3e50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Konverter Log Transaksi</h2>
    <p>Tempelkan log transaksi mentah di bawah ini:</p>
    <textarea id="rawLog" placeholder="Tempel log mentah di sini... (Salin langsung dari spreadsheet)"></textarea>
    
    <div class="btn-group">
        <button class="btn-submit" onclick="processData()">Submit Data</button>
        <button class="btn-copy" onclick="copyResult()">Salin Hasil</button>
        <button class="btn-reset" onclick="resetAll()">Reset All</button>
    </div>

    <div class="table-container">
        <h3>Hasil Submit</h3>
        <table id="resultTable">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Tanggal Terima</th>
                    <th>User</th>
                    <th>Jumlah</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="emptyRow" colspan="4" style="text-align: center; color: #888;">Belum ada data. Silakan tempel log dan klik Submit.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
// Variabel global untuk menyimpan data hasil proses agar mudah disalin
let currentParsedRows = [];

function processData() {
    const rawText = document.getElementById('rawLog').value.trim();
    if (!rawText) {
        alert('Silakan tempelkan log transaksi terlebih dahulu!');
        return;
    }

    const lines = rawText.split('\n');
    let parsedRows = [];

    lines.forEach(line => {
        const trimmedLine = line.trim();
        if (trimmedLine === "") return;

        const columns = trimmedLine.split('\t');

        if (columns.length >= 6) {
            const tanggalPenuh = `${columns[0].trim()} ${columns[1] ? columns[1].trim() : ""}`.trim();
            const userText = columns[2] ? columns[2].trim() : ""; 
            const jumlahText = columns[5] ? columns[5].trim() : "";

            parsedRows.push({
                tanggal: tanggalPenuh,
                user: userText,
                jumlah: jumlahText
            });
        }
    });

    if (parsedRows.length === 0) {
        alert('Format log tidak dikenali. Pastikan Anda menyalin data langsung dari tabel spreadsheet minimal kolom A sampai F.');
        return;
    }

    parsedRows.reverse();
    currentParsedRows = parsedRows; // Simpan ke variabel global

    const tbody = document.querySelector('#resultTable tbody');
    tbody.innerHTML = "";

    parsedRows.forEach((row, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${index + 1}</td>
            <td>${row.tanggal}</td>
            <td>${row.user}</td>
            <td>${row.jumlah}</td>
        `;
        tbody.appendChild(tr);
    });
}

// FUNGSI BARU: MENYALIN DATA HASIL KONVERSI KE CLIPBOARD
function copyResult() {
    if (currentParsedRows.length === 0) {
        alert('Tidak ada data hasil konversi yang bisa disalin!');
        return;
    }

    // Membuat format teks rapi pisah kolom Tab, baris Enter (agar siap di-paste kembali)
    let textToCopy = "No\tTanggal Terima\tUser\tJumlah\n";
    currentParsedRows.forEach((row, index) => {
        textToCopy += `${index + 1}\t${row.tanggal}\t${row.user}\t${row.jumlah}\n`;
    });

    navigator.clipboard.writeText(textToCopy.trim())
        .then(() => {
            alert('Hasil sukses disalin ke clipboard!');
        })
        .catch(err => {
            alert('Gagal menyalin teks: ', err);
        });
}

// FUNGSI BARU: RESET SEMUA INPUT DAN TABEL HASIL
function resetAll() {
    document.getElementById('rawLog').value = "";
    currentParsedRows = [];
    
    const tbody = document.querySelector('#resultTable tbody');
    tbody.innerHTML = `
        <tr>
            <td id="emptyRow" colspan="4" style="text-align: center; color: #888;">Belum ada data. Silakan tempel log dan klik Submit.</td>
        </tr>
    `;
}
</script>

</body>
</html>
